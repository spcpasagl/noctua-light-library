<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Berita - Noctua Light</title>
  <link rel="icon" type="image/png" href="assets/icon/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0A1931', dark: '#050C1A', mid: '#15305B', light: '#1E3E6D' },
            gold: { DEFAULT: '#E5A93C', light: '#F4C46B', pale: '#FBF5E6' },
            cream: { DEFAULT: '#FAF8F5', secondary: '#F1EDE6', dark: '#070F21', darkSecondary: '#0F1E36' }
          },
          fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Plus Jakarta Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  <script src="assets/js/database.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>
</head>
<body class="bg-cream dark:bg-cream-dark text-navy dark:text-white font-sans transition-colors duration-300">

<div class="container mx-auto p-4 max-w-7xl">
  
  <div class="bg-white dark:bg-navy-mid p-5 rounded-2xl shadow-sm border border-navy/5 dark:border-white/5 flex flex-wrap justify-between items-center mb-8 gap-4">
    <div class="flex items-center gap-3">
      <img src="assets/icon/book-open-text-fill.svg" class="w-7 h-7 dark:invert opacity-80" alt="Berita">
      <h1 class="text-2xl font-heading font-bold tracking-tight">Manajemen Berita & Kegiatan</h1>
    </div>
    <div class="flex items-center gap-3">
      <span id="userRole" class="text-xs font-bold bg-navy/5 dark:bg-white/10 px-3 py-1.5 rounded-lg border border-navy/10 dark:border-white/10 text-navy dark:text-gold uppercase tracking-wider"></span>
      <button id="darkToggle" onclick="handleDarkToggle()" title="Toggle Dark Mode"
        class="w-10 h-10 flex items-center justify-center rounded-xl bg-cream-secondary dark:bg-navy-dark hover:bg-navy/10 transition border border-navy/5 dark:border-white/5">
        <img id="icon-sun" src="assets/icon/sun.svg" class="w-5 h-5 invert hidden" alt="Light">
        <img id="icon-moon" src="assets/icon/moon.svg" class="w-5 h-5 block" alt="Dark">
      </button>
      <a href="admin-dashboard.html" class="bg-navy-light text-white text-xs font-bold uppercase tracking-wider px-4 py-2.5 rounded-xl hover:bg-navy transition shadow-sm border border-white/5">&larr; Dasbor</a>
      <button onclick="logout()" class="bg-red-600 text-white text-xs font-bold uppercase tracking-wider px-4 py-2.5 rounded-xl hover:bg-red-700 transition shadow-sm">Logout</button>
    </div>
  </div>

  <div class="flex flex-col sm:flex-row justify-between items-stretch sm:items-center mb-6 gap-4">
    <div class="flex gap-2 flex-wrap items-center">
      <button id="btnTambah" class="bg-navy text-white dark:bg-gold dark:text-navy text-xs font-bold uppercase tracking-wider px-5 py-3 rounded-xl hover:opacity-90 shadow-md transition transform hover:-translate-y-0.5">
        + Tambah Warta Baru
      </button>
      <input type="text" id="searchBerita" placeholder="Cari judul warta..." 
        class="bg-white dark:bg-navy-mid border border-navy/10 dark:border-white/10 px-4 py-2.5 rounded-xl text-xs focus:outline-none focus:border-gold placeholder-navy/30 dark:placeholder-white/30 w-64">
    </div>
    <div id="tabelInfo" class="text-[10px] font-bold uppercase tracking-widest text-navy/40 dark:text-white/40 text-right"></div>
  </div>

  <div class="bg-white dark:bg-navy-mid rounded-2xl shadow-sm border border-navy/5 dark:border-white/5 overflow-x-auto max-h-[500px] overflow-y-auto custom-scrollbar">
    <table class="w-full text-sm text-left border-collapse min-w-[800px]">
      <thead class="sticky top-0 z-10 shadow-sm bg-cream dark:bg-navy text-xs uppercase tracking-wider text-navy/60 dark:text-white/60 font-bold border-b border-navy/10 dark:border-white/10">
        <tr>
          <th class="px-6 py-4 w-24">ID</th>
          <th class="px-6 py-4 w-36">Tanggal</th>
          <th class="px-6 py-4">Judul Berita / Agenda</th>
          <th class="px-6 py-4 text-center w-36">Aksi</th>
        </tr>
      </thead>
      <tbody id="tabelBerita" class="divide-y divide-navy/5 dark:divide-white/5 font-light text-xs text-navy/90 dark:text-white/90">
        <tr><td colspan="4" class="text-center p-6 text-navy/40 dark:text-white/40">Memuat berkas pangkalan data warta...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="modalForm" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm transition-all duration-300">
  <div class="bg-white dark:bg-navy-mid rounded-2xl shadow-2xl w-full max-w-2xl border border-navy/10 dark:border-white/10 flex flex-col overflow-hidden animate-fade-in">
    <div class="bg-cream dark:bg-navy-dark border-b border-navy/10 dark:border-white/10 px-6 py-4 flex justify-between items-center shrink-0">
      <h2 id="modalTitle" class="text-xl font-heading font-bold tracking-tight text-navy dark:text-white">Tambah/Edit Registrasi Berita</h2>
      <button onclick="closeModal()" class="text-navy/50 dark:text-white/50 hover:text-navy dark:hover:text-white text-2xl font-bold transition leading-none">&times;</button>
    </div>
    
    <div class="p-6 overflow-y-auto custom-scrollbar">
      <form id="beritaForm" class="space-y-4 text-sm">
        <input type="hidden" id="editId">

        <div>
          <label class="block text-xs font-bold text-navy/60 dark:text-white/60 uppercase tracking-widest mb-1.5 ml-1">Tanggal Rilis *</label>
          <input type="date" id="tanggal" class="w-full bg-cream-secondary dark:bg-navy-dark border border-transparent focus:border-gold dark:text-white px-4 py-2.5 rounded-xl focus:outline-none transition-all text-xs sm:text-sm" required>
        </div>

        <div>
          <label class="block text-xs font-bold text-navy/60 dark:text-white/60 uppercase tracking-widest mb-1.5 ml-1">Judul Utama Warta *</label>
          <input type="text" id="judul" placeholder="Cth: Festival Literasi Digital Mahasiswa 2026" class="w-full bg-cream-secondary dark:bg-navy-dark border border-transparent focus:border-gold dark:text-white px-4 py-2.5 rounded-xl focus:outline-none transition-all placeholder-navy/20 dark:placeholder-white/20" required>
        </div>

        <div>
          <label class="block text-xs font-bold text-navy/60 dark:text-white/60 uppercase tracking-widest mb-1.5 ml-1">Muatan Konten / Narasi Berita *</label>
          <textarea id="konten" rows="5" placeholder="Tuliskan isi rilis berita lengkap di sini..." class="w-full bg-cream-secondary dark:bg-navy-dark border border-transparent focus:border-gold dark:text-white px-4 py-2.5 rounded-xl focus:outline-none transition-all placeholder-navy/20 dark:placeholder-white/20 resize-none" required></textarea>
        </div>

        <div>
          <label class="block text-xs font-bold text-navy/60 dark:text-white/60 uppercase tracking-widest mb-1.5 ml-1">URL Gambar Header</label>
          <input type="url" id="gambar" placeholder="https://images.unsplash.com/..." class="w-full bg-cream-secondary dark:bg-cream-darkSecondary border border-transparent focus:border-gold dark:text-white px-4 py-2.5 rounded-xl focus:outline-none transition-all placeholder-navy/20 dark:placeholder-white/20">
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-navy/5 dark:border-white/5 mt-2">
          <button type="button" onclick="closeModal()" class="bg-cream-secondary text-navy dark:bg-navy-dark dark:text-white px-6 py-3 rounded-xl text-xs font-bold uppercase tracking-wider hover:opacity-80 transition shadow-sm">Batal</button>
          <button type="submit" class="bg-navy text-white dark:bg-gold dark:text-navy px-6 py-3 rounded-xl text-xs font-bold uppercase tracking-wider hover:opacity-90 transition shadow-md">Simpan Data</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  function handleDarkToggle() {
    toggleDarkMode();
    updateDarkIcon();
  }
  function updateDarkIcon() {
    const isDark = document.documentElement.classList.contains('dark');
    const iconSun = document.getElementById('icon-sun');
    const iconMoon = document.getElementById('icon-moon');
    if (iconSun && iconMoon) {
      if (isDark) { iconSun.classList.remove('hidden'); iconMoon.classList.add('hidden'); } 
      else { iconSun.classList.add('hidden'); iconMoon.classList.remove('hidden'); }
    }
  }
  document.addEventListener('DOMContentLoaded', updateDarkIcon);

  const user = checkSession();
  if (user) {
    document.getElementById("userRole").innerHTML = `${user.username} (${user.role})`;
    renderTabel();
  } else {
    window.location.href = "login.html";
  }

  function renderTabel() {
    const searchVal = (document.getElementById("searchBerita").value || '').toLowerCase().trim();
    let berita = (typeof getAllBerita === 'function') ? getAllBerita() : (JSON.parse(localStorage.getItem("berita_perpus")) || []);
    
    if (searchVal) {
      berita = berita.filter(b => (b.judul || '').toLowerCase().includes(searchVal));
    }
    
    // Urutkan dari tanggal terbaru
    berita.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

    const tbody = document.getElementById("tabelBerita");
    const info = document.getElementById("tabelInfo");
    if (info) info.textContent = `Total Muatan: ${berita.length} Record Terindeks`;

    if (!berita.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center p-6 text-navy/40 dark:text-white/40">Tidak ada record data berita ditemukan.</td></tr>';
      return;
    }

    tbody.innerHTML = '';
    berita.forEach(item => {
      const row = tbody.insertRow();
      row.className = "hover:bg-cream-secondary/30 dark:hover:bg-navy-dark/30 transition-colors";

      const cId = row.insertCell(0); cId.className = "px-6 py-3.5 border-b border-navy/5 dark:border-white/5 font-bold"; cId.textContent = item.id;
      const cTgl = row.insertCell(1); cTgl.className = "px-6 py-3.5 border-b border-navy/5 dark:border-white/5"; cTgl.textContent = item.tanggal;
      const cJdl = row.insertCell(2); cJdl.className = "px-6 py-3.5 border-b border-navy/5 dark:border-white/5 font-semibold max-w-md truncate"; cJdl.textContent = item.judul;
      
      const cAksi = row.insertCell(3);
      cAksi.className = "px-6 py-3.5 border-b border-navy/5 dark:border-white/5 whitespace-nowrap text-center flex items-center justify-center gap-1";

      const btnEdit = document.createElement("button");
      btnEdit.innerHTML = '<img src="assets/icon/pencil.svg" class="w-4 h-4 dark:invert opacity-70" alt="Edit">';
      btnEdit.title = "Edit Warta";
      btnEdit.className = "bg-navy/5 border border-navy/10 hover:bg-navy/10 text-navy dark:bg-white/5 dark:border-white/10 dark:text-white p-2 rounded-xl text-xs transition";
      btnEdit.onclick = () => openEditModal(item);
      cAksi.appendChild(btnEdit);

      if (getCurrentUserRole() === "super_admin") {
        const btnHapus = document.createElement("button");
        btnHapus.innerHTML = '<img src="assets/icon/sampah.svg" class="w-4 h-4 dark:invert opacity-70" alt="Hapus">';
        btnHapus.title = "Hapus Absolut";
        btnHapus.className = "bg-red-600/10 border border-red-600/20 text-red-600 p-2 rounded-xl text-xs hover:bg-red-600 hover:text-white transition";
        btnHapus.onclick = () => {
          if (confirm(`Apakah Anda yakin menghapus permanen berita "${item.judul}"?`)) {
            const filtered = getAllBerita().filter(b => b.id !== item.id);
            saveAllBerita(filtered);
            renderTabel();
          }
        };
        cAksi.appendChild(btnHapus);
      }
    });
  }

  document.getElementById("searchBerita").addEventListener("input", renderTabel);

  function openEditModal(item = null) {
    const modal = document.getElementById("modalForm");
    modal.classList.remove("hidden"); modal.classList.add("flex");

    if (item) {
      document.getElementById("modalTitle").innerText = "Edit Registrasi Berita";
      document.getElementById("editId").value = item.id;
      document.getElementById("tanggal").value = item.tanggal;
      document.getElementById("judul").value = item.judul;
      document.getElementById("konten").value = item.konten;
      document.getElementById("gambar").value = item.gambar || "";
    } else {
      document.getElementById("modalTitle").innerText = "Tambah Registrasi Berita Baru";
      document.getElementById("beritaForm").reset();
      document.getElementById("editId").value = "";
    }
  }

  function closeModal() {
    const modal = document.getElementById("modalForm");
    modal.classList.add("hidden"); modal.classList.remove("flex");
  }

  document.getElementById("beritaForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const editId = document.getElementById("editId").value;
    let berita = (typeof getAllBerita === 'function') ? getAllBerita() : (JSON.parse(localStorage.getItem("berita_perpus")) || []);

    const newData = {
      id: editId || "BR" + String(berita.length ? Math.max(...berita.map(b => parseInt(b.id.replace('BR','')))) + 1 : 1).padStart(3, '0'),
      tanggal: document.getElementById("tanggal").value,
      judul: document.getElementById("judul").value.trim(),
      konten: document.getElementById("konten").value.trim(),
      gambar: document.getElementById("gambar").value.trim() || null
    };

    if (editId) {
      const idx = berita.findIndex(b => b.id === editId);
      if (idx !== -1) berita[idx] = newData;
    } else {
      berita.push(newData);
    }

    if (typeof saveAllBerita === 'function') {
      saveAllBerita(berita);
    } else {
      localStorage.setItem("berita_perpus", JSON.stringify(berita));
    }
    
    closeModal();
    renderTabel();
  });

  document.getElementById("btnTambah").addEventListener("click", () => openEditModal(null));
</script>
</body>
</html>
