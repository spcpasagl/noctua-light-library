<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Noctua Light</title>
  <link rel="icon" type="image/png" href="assets/icon/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0A1931', dark: '#050C1A', mid: '#15305B', light: '#1E3E6D' },
            gold: { DEFAULT: '#E5A93C', light: '#F4C46B', pale: '#FBF5E6' },
            cream: { DEFAULT: '#FAF8F5', secondary: '#F1EDE6', dark: '#070F21', darkSecondary: '#0F1E36' },
            accent: '#E63946'
          },
          fontFamily: { 
            sans: ['Inter', 'sans-serif'],
            heading: ['Plus Jakarta Sans', 'sans-serif']
          }
        }
      }
    }
  </script>
  <script src="assets/js/database.js"></script>
  <script src="assets/js/auth.js"></script>
</head>
<body class="min-h-screen bg-cream dark:bg-cream-dark flex items-center justify-center p-4 transition-colors relative overflow-x-hidden overflow-y-auto font-sans">

  <!-- Background Pattern -->
  <div class="absolute inset-0 opacity-[0.03] pointer-events-none bg-[radial-gradient(#0A1931_1px,transparent_1px)] dark:bg-[radial-gradient(#fff_1px,transparent_1px)] [background-size:20px_20px]"></div>

  <!-- Dark Mode Toggle -->
  <button id="darkToggle" onclick="handleDarkToggle()" title="Toggle Dark Mode"
    class="fixed top-6 right-6 z-50 w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-navy-mid border border-navy/10 dark:border-white/10 shadow-sm hover:bg-gray-50 dark:hover:bg-navy-light transition-all text-sm">
    <img id="icon-sun" src="assets/icon/sun.svg" class="w-4 h-4 invert hidden" alt="Light Mode">
    <img id="icon-moon" src="assets/icon/moon.svg" class="w-4 h-4 block" alt="Dark Mode">
  </button>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md">
    <div class="bg-white dark:bg-navy-mid rounded-3xl shadow-xl border border-navy/5 dark:border-white/5 overflow-hidden transition-colors">

      <!-- Card Header -->
      <div class="bg-navy p-8 text-center relative border-b-4 border-gold">
        <div class="flex justify-center mb-4">
          <img src="assets/icon/logo.png" class="w-14 h-14 object-contain" alt="Logo">
        </div>
        <h1 class="text-2xl font-heading font-bold tracking-wide text-white uppercase">Noctua Light</h1>
        <p class="text-gold text-xs font-semibold tracking-widest uppercase mt-2">Area Sistem Keamanan</p>
      </div>

      <!-- Card Body -->
      <div class="p-8">
        <h2 class="text-sm font-bold text-navy/60 dark:text-white/60 mb-6 text-center uppercase tracking-wider">
          Otentikasi Staf / Kurator
        </h2>

        <form id="loginForm" class="space-y-5" novalidate>
          <div>
            <label class="block text-xs font-bold text-navy/60 dark:text-white/60 uppercase tracking-widest mb-1.5 ml-1">Username</label>
            <div class="relative">
              <input type="text" id="username" placeholder="Masukkan username" required
                class="w-full pl-5 pr-4 py-3 bg-cream-secondary dark:bg-navy-dark border border-transparent focus:border-gold dark:text-white rounded-xl text-sm font-medium focus:outline-none transition-all placeholder-navy/30 dark:placeholder-white/30">
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-navy/60 dark:text-white/60 uppercase tracking-widest mb-1.5 ml-1">Katasandi</label>
            <div class="relative">
              <input type="password" id="password" placeholder="••••••••" required
                class="w-full pl-5 pr-12 py-3 bg-cream-secondary dark:bg-navy-dark border border-transparent focus:border-gold dark:text-white rounded-xl text-sm font-medium focus:outline-none transition-all placeholder-navy/30 dark:placeholder-white/30">
              <button type="button" id="togglePwd" class="absolute right-4 top-1/2 -translate-y-1/2 text-navy/40 dark:text-white/40 hover:text-gold transition font-bold text-xs" title="Tampilkan/sembunyikan password">
                LIHAT
              </button>
            </div>
          </div>

          <div id="errorMsg" class="hidden text-red-600 text-xs font-bold text-center bg-red-600/10 border border-red-600/20 rounded-xl px-4 py-3 uppercase tracking-wider"></div>

          <button type="submit" class="w-full bg-navy text-white dark:bg-gold dark:text-navy font-bold py-3.5 rounded-xl text-sm tracking-wider uppercase hover:opacity-90 transition-all shadow-md transform hover:-translate-y-0.5 mt-2">
            Verifikasi Masuk
          </button>
        </form>

        <div class="mt-6 pt-5 border-t border-navy/5 dark:border-white/5">
          <p class="text-[10px] font-bold text-navy/40 dark:text-white/40 text-center mb-3 uppercase tracking-widest">Kredensial Evaluasi</p>
          <div class="flex gap-2">
            <button onclick="fillCreds('super_admin','admin123')" class="flex-1 text-xs font-bold bg-navy/5 dark:bg-white/5 hover:bg-navy/10 dark:hover:bg-white/10 text-navy dark:text-white rounded-lg py-2 transition border border-navy/10 dark:border-white/10">
              SUPER ADMIN
            </button>
            <button onclick="fillCreds('staff_admin','staff123')" class="flex-1 text-xs font-bold bg-navy/5 dark:bg-white/5 hover:bg-navy/10 dark:hover:bg-white/10 text-navy dark:text-white rounded-lg py-2 transition border border-navy/10 dark:border-white/10">
              STAFF ADMIN
            </button>
          </div>
        </div>

        <div class="mt-6 text-center">
          <a href="index.html" class="text-xs font-bold text-gold hover:text-navy dark:hover:text-white transition uppercase tracking-wider flex items-center justify-center gap-1">
            &larr; Kembali ke Beranda Utama
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function handleDarkToggle() {
      const isDark = toggleDarkMode();
      updateDarkIcon();
    }
    function updateDarkIcon() {
      const isDark = document.documentElement.classList.contains('dark');
      const iconSun = document.getElementById('icon-sun');
      const iconMoon = document.getElementById('icon-moon');
      if (iconSun && iconMoon) {
        if (isDark) { iconSun.classList.remove('hidden'); iconMoon.classList.add('hidden'); } 
        else { iconSun.classList.add('hidden'); iconMoon.classList.remove('hidden'); }
      }
    }
    document.addEventListener('DOMContentLoaded', updateDarkIcon);

    if (typeof initDatabase === 'function') initDatabase();

    (function() {
      const existing = sessionStorage.getItem("current_user");
      if (existing) window.location.href = "admin-dashboard.html";
    })();

    document.getElementById('togglePwd').addEventListener('click', function() {
      const pwd = document.getElementById('password');
      const isHidden = pwd.type === 'password';
      pwd.type = isHidden ? 'text' : 'password';
      this.textContent = isHidden ? 'TUTUP' : 'LIHAT';
    });

    function fillCreds(user, pass) {
      document.getElementById('username').value = user;
      document.getElementById('password').value = pass;
      document.getElementById('errorMsg').classList.add('hidden');
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMsg');

      if (!username || !password) {
        errorDiv.textContent = '⚠️ Kredensial Tidak Lengkap!';
        errorDiv.classList.remove('hidden');
        return;
      }

      const result = login(username, password);
      if (result.success) {
        errorDiv.textContent = '✅ OTENTIKASI BERHASIL!';
        errorDiv.className = errorDiv.className.replace('text-red-600', 'text-green-600').replace('bg-red-600/10', 'bg-green-50').replace('border-red-600/20', 'border-green-200');
        errorDiv.classList.remove('hidden');
        setTimeout(() => window.location.href = 'admin-dashboard.html', 600);
      } else {
        errorDiv.textContent = '❌ ' + (result.message || 'Kredensial Tidak Valid!');
        errorDiv.classList.remove('hidden');
        const form = document.getElementById('loginForm');
        form.style.transform = 'translateX(6px)';
        setTimeout(() => { form.style.transform = 'translateX(-6px)'; }, 80);
        setTimeout(() => { form.style.transform = 'translateX(4px)'; }, 160);
        setTimeout(() => { form.style.transform = 'translateX(0)'; }, 240);
      }
    });
  </script>
</body>
</html>
